# ── LLM 配置 ─────────────────────────────────────────────
openai:
  api_key: "sk-a3b...4f9e"  # DeepSeek API Key
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"  # 支持原生 tool_use 的模型
  max_retries: 3            # HTTP 5xx 错误重试次数
  timeout: 120              # 请求超时秒数

# ── Agent 配置 ──────────────────────────────────────────
agent:
  max_steps: 10             # 最多推理步数
  verbose: true             # 打印每一步的细节（工具调用、参数、结果）
  workdir: "."              # 工作目录，工具操作默认路径
